name: Update SAR Data

on:
  schedule:
    # Daily at UTC 02:00 (Taiwan time 10:00)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Number of days to look back (default: 7)'
        required: false
        default: '7'
      full_rebuild:
        description: 'Set true to rebuild the full metadata catalog'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

# Only one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: Fetch data, generate meta4 files, commit ──────────────────────────
  update-data:
    name: Fetch ASF + Copernicus data
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      data-changed: ${{ steps.commit.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Uses only the standard library — no pip install needed
      # Uncomment below if asf_search SDK is required in the future:
      # - run: pip install asf-search

      - name: Run data fetch
        env:
          DAYS_BACK: ${{ github.event.inputs.days_back || '7' }}
          FORCE_FULL_REBUILD: ${{ github.event.inputs.full_rebuild || 'false' }}
        run: python fetch_sar_data.py

      - name: Print summary
        run: |
          python - << 'EOF'
          import json
          d = json.load(open('data/sar_status.json'))
          print(f"Updated at      : {d['updated_at']}")
          print(f"Total frames    : {d['total_frames']}")
          print(f"  ASF           : {d.get('asf_count', '?')}")
          print(f"  Copernicus    : {d.get('copernicus_count', '?')}")
          print(f"Satellite dist  : {d['satellite_summary']}")
          import os; print(f"ASF meta4       : {os.path.getsize('data/asf_taiwan.meta4')} bytes")
          print(f"Copernicus meta4: {os.path.getsize('data/copernicus_taiwan.meta4')} bytes")
          EOF

      - name: Commit and push updated data
        id: commit
        run: |
          git config user.name  "SAR Monitor Bot"
          git config user.email "sar-monitor[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "data: auto-update SAR acquisitions $(date -u '+%Y-%m-%d')"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  # ── Job 2: Deploy to GitHub Pages ────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: update-data
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout (including latest data/)
        uses: actions/checkout@v4
        with:
          ref: main   # ensure the freshly committed data is included

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject build timestamp
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%MZ')
          python3 -c "import pathlib; p=pathlib.Path('index.html'); p.write_text(p.read_text('utf-8').replace('__BUILD_TIME__','$BUILD_TIME'),'utf-8'); print('Injected: $BUILD_TIME')"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # serve entire repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
